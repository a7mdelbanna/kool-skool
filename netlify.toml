# Netlify deployment configuration

[build]
  # Directory to change to before starting a build
  base = "/"
  
  # Build command
  command = "npm run build"
  
  # Directory that contains the deploy-ready files
  publish = "dist"
  
  # Node version
  environment = { NODE_VERSION = "18" }

[build.environment]
  # Ensures proper module resolution
  NPM_FLAGS = "--legacy-peer-deps"

# Production context: All deploys from the production branch
[context.production]
  # Production branch name
  branch = "production"
  
  # Production environment variables will be set in Netlify dashboard
  command = "npm run build"
  
  [context.production.environment]
    VITE_ENV = "production"
    VITE_FIREBASE_ENV = "production"

# Deploy Preview context: All deploys generated from pull/merge requests
[context.deploy-preview]
  command = "npm run build"
  
  [context.deploy-preview.environment]
    VITE_ENV = "preview"
    VITE_FIREBASE_ENV = "development"

# Branch deploy context: All deploys that are not from PR and not from production branch
[context.branch-deploy]
  command = "npm run build"
  
  [context.branch-deploy.environment]
    VITE_ENV = "development"
    VITE_FIREBASE_ENV = "development"

# Redirects and headers
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # This is important for React Router

[[headers]]
  for = "/*"
  
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Caching for static assets
    Cache-Control = '''
      public, 
      max-age=31536000, 
      immutable
    '''

[[headers]]
  for = "/index.html"
  
  [headers.values]
    # Don't cache the main HTML file
    Cache-Control = '''
      no-cache, 
      no-store, 
      must-revalidate
    '''

# Plugins
[[plugins]]
  package = "@netlify/plugin-lighthouse"
  
  [plugins.inputs]
    # Performance audits
    output_path = "reports/lighthouse.html"
    
    [plugins.inputs.thresholds]
      performance = 0.9
      accessibility = 0.9
      best-practices = 0.9
      seo = 0.9